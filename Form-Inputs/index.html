<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <form action="">
      <div>
        <label for="name">Name</label><br>
        <input name="name" type="text" placeholder="Enter Your Email" />
      </div>
      <div>
        <input type="password" placeholder="Enter Your Password" />
      </div>
      <div>
        <select name="Fruits">
          <option value="Apple">Apple</option>
          <option value="Mango">Mango</option>
          <option value="Banana">Banana</option>
          <option value="Pineapple">Pineapple</option>
        </select>
      </div>
      <div>
        <input name="Gender" id="Male" type="radio" />
        <label for="Male">Male</label>

        <input name="Gender" id="Female" type="radio" />
        <label for="Female">Female</label>

        <input name="Gender" id="Not" type="radio" />
        <label for="Not">Not Pref</label>
      </div>

      <div>
        <input id="com" type="checkbox" />
        <label for="com">Computer</label>
      </div>

      <div>
        <textarea
          maxlength="10"
          rows="3"
          cols="15"
          name="Comment"
          id=""
          placeholder="shdgf"
        >
        </textarea>
      </div>
    </form>
  </body>
</html>
