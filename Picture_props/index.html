<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }
        body {
            height: 100vh;
            width: 100%;
            background: lightblue;

        }
        .container {
            height: 300px;
            width: 400px;
            background: rgb(218, 230, 173);
            border: 2px solid black;
            color: aqua;
            background-image: url("https://images.unsplash.com/photo-1730724056895-9d566f3c5f89?q=80&w=1192&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D");
            background-repeat: no-repeat;
            background-size: cover;
            background-position: center;
        }

        img {
            height: 300px;
            width: 300px;
            object-fit: cover;
            object-position: top right;
        }
    </style>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div style="" class="container">
        <p>Lorem ipsum dolor sit amet.
        </p>
        <button>Start</button>
        <!-- <img src="./images/test.jpg" alt=""> -->
    </div>
    <!-- To download pictures from any website, simple go in inspect mode then go to networks tab and refresh the website and all the media will display below, open your desired media in new tab and download it -->
</body>
</html>
