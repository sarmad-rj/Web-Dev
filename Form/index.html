<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      body {
        background: #3f5efb;
        background: radial-gradient(
          circle,
          rgba(63, 94, 251, 1) 0%,
          rgba(252, 70, 107, 1) 100%
        );
      }
      .robot {
        border: 1px solid black;
        width: 300px;
        display: flex;
        justify-content: space-between;
      }
      .check {
        width: 20px;
        height: 20px;
        margin-right: 10px;
        margin-left: 20px;
      }
      .left {
        display: flex;
        align-items: center;
      }
      .right {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        padding: 15px 10px;
      }
      .icon {
        width: 25px;
        height: 25px;
      }
      p {
        margin: 0;
      }
    </style>
  </head>
  <body>
    <div class="robot">
      <div class="left">
        <input class="check" type="checkbox" />
        <span>I am not a robot</span>
      </div>
      <div class="right">
        <div>
          <img class="icon" src="./icons/recycle-symbol.png" alt="" />
        </div>
        <p>reCAPTCHA</p>
      </div>
    </div>
  </body>
</html>
